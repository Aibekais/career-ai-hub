{% extends 'base.html' %}
{% block title %}Тіркелу{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <h1>Тіркелу</h1>
    <p class="auth-sub">Жаңа аккаунт жасаңыз</p>
    <form method="POST" class="form">
      <div class="form-group">
        <label for="full_name">Аты-жөні</label>
        <input type="text" id="full_name" name="full_name" required placeholder="Атыңыз">
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" name="password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Тіркелу</button>
    </form>
    <p class="auth-footer">Аккаунтыңыз бар ма? <a href="{{ url_for('login') }}">Кіру</a></p>
  </div>
</div>
{% endblock %}
