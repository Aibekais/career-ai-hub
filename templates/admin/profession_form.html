{% extends 'base.html' %}
{% block title %}{% if profession %}Мамандықты өзгерту{% else %}Жаңа мамандық{% endif %}{% endblock %}
{% block content %}
<div class="dashboard">
  <aside class="sidebar">
    <h3>Әкімші</h3>
    <a href="{{ url_for('admin_professions') }}" class="sidebar-link active">← Артқа</a>
  </aside>
  <div class="dashboard-main">
    <h1>{% if profession %}Мамандықты өзгерту{% else %}Жаңа мамандық{% endif %}</h1>
    <form method="POST" class="form form-wide">
      <div class="form-group"><label>Атау</label><input type="text" name="title" value="{{ profession.title if profession else '' }}" required></div>
      <div class="form-group"><label>Сипаттама</label><textarea name="description" rows="4">{{ profession.description if profession else '' }}</textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Сала</label><input type="text" name="category" value="{{ profession.category if profession else '' }}"></div>
        <div class="form-group"><label>Мин. жалақы</label><input type="number" name="salary_min" value="{{ profession.salary_min if profession else 0 }}"></div>
        <div class="form-group"><label>Макс. жалақы</label><input type="number" name="salary_max" value="{{ profession.salary_max if profession else 0 }}"></div>
      </div>
      <div class="form-group"><label>Дағдылар (үтірмен)</label><input type="text" name="skills_required" value="{{ profession.skills_required if profession else '' }}"></div>
      <div class="form-group"><label>Нарық болжамы</label><input type="text" name="growth_outlook" value="{{ profession.growth_outlook if profession else '' }}"></div>
      <div class="form-check">
        <input type="checkbox" name="is_published" id="pub" {% if not profession or profession.is_published %}checked{% endif %}>
        <label for="pub">Жариялау</label>
      </div>
      <button type="submit" class="btn btn-primary">Сақтау</button>
    </form>
  </div>
</div>
{% endblock %}
