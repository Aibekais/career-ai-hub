{% extends 'base.html' %}
{% block title %}Профиль{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Менің профилім</h1>
  <p>AI ұсынысы дұрыс болуы үшін профильді толықтырыңыз</p>
</div>
<form method="POST" class="form form-wide">
  <div class="form-row">
    <div class="form-group">
      <label>Аты-жөні</label>
      <input type="text" name="full_name" value="{{ current_user.full_name }}" required>
    </div>
    <div class="form-group">
      <label>Телефон</label>
      <input type="text" name="phone" value="{{ current_user.phone or '' }}">
    </div>
  </div>
  <div class="form-group">
    <label>Білім</label>
    <input type="text" name="education" value="{{ profile.education or '' }}" placeholder="Бакалавр, магистр...">
  </div>
  <div class="form-group">
    <label>Дағдылар (үтірмен)</label>
    <textarea name="skills" rows="3">{{ profile.skills or '' }}</textarea>
  </div>
  <div class="form-group">
    <label>Қызығушылық салалары</label>
    <textarea name="interests" rows="3">{{ profile.interests or '' }}</textarea>
  </div>
  <div class="form-row">
    <div class="form-group">
      <label>Тәжірибе (жыл)</label>
      <input type="number" name="experience_years" value="{{ profile.experience_years or 0 }}" min="0">
    </div>
    <div class="form-group">
      <label>Қалаған сала</label>
      <input type="text" name="preferred_field" value="{{ profile.preferred_field or '' }}">
    </div>
  </div>
  <button type="submit" class="btn btn-primary">Сақтау</button>
</form>
{% endblock %}
