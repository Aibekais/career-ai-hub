{% extends 'base.html' %}
{% block title %}Материал жариялау{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Материал жариялау</h1>
  <p>Модератор тексергеннен кейін жарияланады</p>
</div>
<form method="POST" class="form form-wide">
  <div class="form-group">
    <label>Тақырып</label>
    <input type="text" name="title" required>
  </div>
  <div class="form-group">
    <label>Мазмұны</label>
    <textarea name="content" rows="8" required></textarea>
  </div>
  <button type="submit" class="btn btn-primary">Модерацияға жіберу</button>
</form>
{% endblock %}
