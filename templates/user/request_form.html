{% extends 'base.html' %}
{% block title %}Консультация{% endblock %}
{% block content %}
<div class="page-header">
  <h1>Консультация сұрау</h1>
  <p>Менеджер сіздің өтініміңізді өңдейді</p>
</div>
<form method="POST" class="form form-wide">
  <div class="form-group">
    <label>Тақырып</label>
    <input type="text" name="subject" required placeholder="Мамандық таңдау кеңес">
  </div>
  <div class="form-group">
    <label>Хабарлама</label>
    <textarea name="message" rows="5" required placeholder="Сұрағыңызды жазыңыз..."></textarea>
  </div>
  <button type="submit" class="btn btn-primary">Жіберу</button>
</form>
{% endblock %}
